<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawnMate Command Center</title>
<style>
  :root{
    --panel:#ffffff;--ink:#1a1a1a;--muted:#6b7280;--line:#f0d9d9;
    --accent:#dc2626;--accent-soft:#fef2f2;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(135deg,#dc2626 0%,#b91c1c 50%,#7f1d1d 100%);
    min-height:100vh;color:var(--ink);padding:40px 20px;
  }
  .wrap{max-width:1080px;margin:0 auto}
  .shell{background:var(--panel);border-radius:24px;box-shadow:0 30px 60px -20px rgba(127,29,29,.45);overflow:hidden}
  .head{padding:38px 44px 30px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
  .brand{display:flex;align-items:center;gap:14px}
  .logo{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,#dc2626,#991b1b);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px}
  h1{font-size:26px;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:14px;margin-top:3px}
  .search{display:flex;align-items:center;gap:8px;background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:9px 14px;color:var(--muted);font-size:14px;min-width:240px}
  .search input{border:none;background:none;outline:none;font-size:14px;color:var(--ink);width:100%}
  .body{padding:32px 44px 44px}
  .section{margin-bottom:34px}
  .section:last-child{margin-bottom:0}
  .sec-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--accent)}
  .sec-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  .card{display:flex;align-items:flex-start;gap:14px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;text-decoration:none;color:inherit;transition:all .18s ease;position:relative}
  .card:hover{border-color:var(--accent);box-shadow:0 12px 24px -12px rgba(220,38,38,.35);transform:translateY(-2px)}
  .ico{flex:0 0 auto;width:40px;height:40px;border-radius:11px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:19px}
  .card:hover .ico{background:var(--accent);color:#fff}
  .c-title{font-size:15px;font-weight:650;line-height:1.3}
  .c-desc{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.4}
  .arrow{position:absolute;top:16px;right:16px;color:#cbd5e1;font-size:15px;transition:all .18s ease}
  .card:hover .arrow{color:var(--accent);transform:translateX(2px)}
  .foot{padding:16px 44px;background:#f8fafc;border-top:1px solid var(--line);font-size:12.5px;color:var(--muted);text-align:center}
  .empty{grid-column:1/-1;color:var(--muted);font-size:14px;padding:20px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="shell">
    <div class="head">
      <div class="brand">
        <div class="logo">PM</div>
        <div>
          <h1>PawnMate Command Center</h1>
          <div class="sub">Quick-reference guides for daily operations</div>
        </div>
      </div>
      <div class="search">
        <span>🔍</span>
        <input id="search" placeholder="Search guides…" oninput="render()">
      </div>
    </div>
    <div class="body" id="board"></div>
    <div class="foot">Add or edit guides in the <code>GUIDES</code> list at the top of this file — one line per guide.</div>
  </div>
</div>

<script>
/* ─────────────────────────────────────────────────────────────
   EDIT HERE: to add a guide, copy one line and fill it in.
   section = the category header it appears under (in order below)
   icon    = any emoji     url = the Scribe share link ("#" = placeholder)
   ───────────────────────────────────────────────────────────── */
const SECTIONS = ["Getting Started","Reports & History","Pawn Defaults & Layaways","Inventory & Listings"];

const GUIDES = [
  { section:"Getting Started",            icon:"🔑", title:"Log Into PawnMate",                     desc:"Sign in and access your account",        url:"#" },
  { section:"Getting Started",            icon:"🏪", title:"Switch Between Stores",                 desc:"Move between store locations",            url:"#" },

  { section:"Reports & History",          icon:"📊", title:"Generate a Management Report",          desc:"Pull performance & summary reports",      url:"#" },
  { section:"Reports & History",          icon:"🧾", title:"Access Transaction History",            desc:"Look up past transactions",               url:"#" },

  { section:"Pawn Defaults & Layaways",   icon:"📅", title:"View the 15-Day Pawn Defaultable List", desc:"See pawns approaching default",           url:"#" },
  { section:"Pawn Defaults & Layaways",   icon:"💳", title:"Current & Defaultable Layaways",        desc:"Track active and at-risk layaways",       url:"#" },

  { section:"Inventory & Listings",       icon:"📦", title:"Search for Aged Inventory",             desc:"Find items sitting in stock too long",    url:"#" },
  { section:"Inventory & Listings",       icon:"🌐", title:"Manage Online Listings",               desc:"Post & track items listed online",        url:"#" },
];
/* ───────────────────────────────────────────────────────────── */

function render(){
  const q = (document.getElementById("search").value || "").toLowerCase();
  const board = document.getElementById("board");
  board.innerHTML = "";
  SECTIONS.forEach(sec => {
    const items = GUIDES.filter(g => g.section === sec &&
      (g.title.toLowerCase().includes(q) || g.desc.toLowerCase().includes(q)));
    if(!items.length) return;
    const section = document.createElement("div");
    section.className = "section";
    section.innerHTML = `<div class="sec-head"><span class="dot"></span><span class="sec-title">${sec}</span></div>`;
    const grid = document.createElement("div");
    grid.className = "grid";
    items.forEach(g => {
      const a = document.createElement("a");
      a.className = "card";
      a.href = g.url;
      if(g.url && g.url !== "#"){ a.target = "_blank"; a.rel = "noopener"; }
      a.innerHTML = `<div class="ico">${g.icon}</div>
        <div><div class="c-title">${g.title}</div><div class="c-desc">${g.desc}</div></div>
        <span class="arrow">→</span>`;
      grid.appendChild(a);
    });
    section.appendChild(grid);
    board.appendChild(section);
  });
  if(!board.children.length){
    board.innerHTML = `<div class="empty">No guides match “${q}”.</div>`;
  }
}
render();
</script>
</body>
</html>
