<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawnMate Command Center</title>
<style>
  :root{
    --ink:#22304d;--muted:#5b6b7d;--line:#dbe1ec;
    --blue:#22304d;--blue-dark:#1a2540;--blue-soft:#e9edf8;
    --gold:#f4c14e;--gold-dark:#dca82f;
    --sidebar-w:270px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);background:#eef2f6;
  }
  .app{display:flex;min-height:100vh}

  /* ── Sidebar ── */
  .sidebar{
    width:var(--sidebar-w);flex:0 0 var(--sidebar-w);
    background:linear-gradient(180deg,#26365a 0%,#1b2740 100%);
    color:#fff;display:flex;flex-direction:column;
    padding:26px 18px;position:sticky;top:0;height:100vh;
  }
  .brand{display:flex;align-items:center;gap:12px;padding:0 6px 20px}
  .logo{width:42px;height:42px;background:var(--gold);color:var(--blue-dark);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px}
  .brand h1{font-size:17px;line-height:1.2;letter-spacing:-.01em}
  .brand .sub{font-size:11.5px;opacity:.85;margin-top:2px}
  .search{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.28);padding:9px 12px;margin-bottom:18px}
  .search input{border:none;background:none;outline:none;font-size:13.5px;color:#fff;width:100%}
  .search input::placeholder{color:rgba(255,255,255,.7)}
  .nav{display:flex;flex-direction:column;gap:3px;overflow-y:auto;flex:1}
  .nav-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;opacity:.65;padding:6px 10px 8px}
  .nav-item{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 12px;cursor:pointer;font-size:13.5px;font-weight:550;
    color:#fff;transition:background .15s ease;user-select:none;
    border-left:3px solid transparent;
  }
  .nav-item:hover{background:rgba(255,255,255,.12)}
  .nav-item.active{background:var(--gold);color:var(--blue-dark);font-weight:700;border-left-color:var(--gold-dark)}
  .nav-item .count{font-size:11px;background:rgba(255,255,255,.2);padding:1px 8px}
  .nav-item.active .count{background:rgba(26,37,64,.18);color:var(--blue-dark)}

  /* ── Main ── */
  .main{flex:1;padding:34px 40px;overflow-y:auto}
  .main-head{margin-bottom:24px;border-bottom:3px solid var(--gold);padding-bottom:14px;display:inline-block}
  .main-head h2{font-size:23px;letter-spacing:-.02em;color:var(--blue-dark)}
  .main-head .desc{color:var(--muted);font-size:14px;margin-top:4px}
  .section{margin-bottom:32px}
  .section:last-child{margin-bottom:0}
  .sec-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--blue);margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .sec-title::before{content:"";width:9px;height:9px;background:var(--gold)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
  .card{display:flex;align-items:flex-start;gap:13px;background:#fff;border:1px solid var(--line);padding:17px;text-decoration:none;color:inherit;transition:all .15s ease;position:relative;border-top:3px solid var(--blue)}
  .card:hover{border-color:var(--line);border-top-color:var(--gold);box-shadow:0 10px 22px -12px rgba(34,48,77,.4);transform:translateY(-2px)}
  .ico{flex:0 0 auto;width:38px;height:38px;background:var(--blue-soft);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:18px}
  .card:hover .ico{background:var(--blue);color:#fff}
  .c-title{font-size:14.5px;font-weight:650;line-height:1.3}
  .c-desc{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4}
  .arrow{position:absolute;top:15px;right:15px;color:#b7c6d6;font-size:15px;transition:all .15s ease}
  .card:hover .arrow{color:var(--blue);transform:translateX(2px)}
  .empty{color:var(--muted);font-size:14px;padding:30px 0}

  /* ── Edit button (inconspicuous, bottom-right) ── */
  .edit-fab{
    position:fixed;bottom:14px;right:14px;width:32px;height:32px;
    background:var(--blue-dark);border:1px solid rgba(255,255,255,.25);
    color:var(--gold);display:flex;align-items:center;justify-content:center;
    cursor:pointer;opacity:.32;transition:opacity .15s ease;z-index:40;
  }
  .edit-fab:hover{opacity:1}
  .edit-fab svg{width:15px;height:15px;fill:currentColor}

  /* ── Editor modal ── */
  .backdrop{position:fixed;inset:0;background:rgba(20,28,45,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .backdrop.open{display:flex}
  .modal{background:#fff;width:100%;max-width:580px;max-height:88vh;display:flex;flex-direction:column;border-top:4px solid var(--gold)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line)}
  .modal-head h3{font-size:17px;color:var(--blue-dark)}
  .modal-x{cursor:pointer;color:var(--muted);font-size:20px;line-height:1;background:none;border:none;padding:4px}
  .modal-body{padding:18px 22px;overflow-y:auto}
  .m-note{font-size:12px;color:var(--muted);background:var(--blue-soft);padding:10px 12px;margin-bottom:16px;line-height:1.5;border-left:3px solid var(--gold)}
  .g-row{display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid var(--line);margin-bottom:6px;font-size:13px}
  .g-row .g-ico{width:26px;text-align:center;font-size:16px}
  .g-row .g-meta{flex:1;min-width:0}
  .g-row .g-t{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .g-row .g-s{font-size:11px;color:var(--muted)}
  .g-row button{border:1px solid var(--line);background:#fff;cursor:pointer;font-size:11.5px;padding:4px 9px;color:var(--blue-dark)}
  .g-row button:hover{background:var(--blue-soft)}
  .g-row button.del{color:#b23}
  .g-row button.del.confirm{background:#b23;color:#fff;border-color:#b23}
  .form{margin-top:16px;border-top:1px solid var(--line);padding-top:16px}
  .form h4{font-size:13px;color:var(--blue-dark);margin-bottom:10px}
  .field{margin-bottom:10px}
  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px}
  .field input,.field select{width:100%;border:1px solid var(--line);padding:8px 10px;font-size:13px;font-family:inherit;background:#fff;color:var(--ink)}
  .field input:focus,.field select:focus{outline:none;border-color:var(--gold)}
  .row2{display:flex;gap:10px}
  .row2 .field{flex:1}
  .row2 .field.icon{flex:0 0 80px}
  .btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .btn{border:none;padding:10px 16px;font-size:13px;font-weight:650;cursor:pointer;font-family:inherit}
  .btn.primary{background:var(--gold);color:var(--blue-dark)}
  .btn.primary:hover{background:var(--gold-dark)}
  .btn.dark{background:var(--blue-dark);color:#fff}
  .btn.dark:hover{background:#0f1830}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--muted)}
  .btn.ghost:hover{background:var(--blue-soft);color:var(--blue-dark)}

  @media(max-width:760px){
    .app{flex-direction:column}
    .sidebar{width:100%;flex:none;height:auto;position:static;padding:18px}
    .nav{flex-direction:row;flex-wrap:wrap;overflow:visible}
    .nav-label{display:none}
    .main{padding:24px 20px}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 64 64" width="27" height="27" fill="#1a2540" aria-label="PawnMate">
          <circle cx="32" cy="15" r="8.2"/>
          <rect x="23" y="23.2" width="18" height="3.8"/>
          <path d="M28 27.8c.7 6.6-1.9 11.6-5.6 18.2h19.2c-3.7-6.6-6.3-11.6-5.6-18.2z"/>
          <rect x="18.5" y="47.5" width="27" height="3.8"/>
          <path d="M16 53h32l2.6 6.2H13.4z"/>
        </svg>
      </div>
      <div>
        <h1>PawnMate</h1>
        <div class="sub">Command Center</div>
      </div>
    </div>
    <div class="search">
      <span>🔍</span>
      <input id="search" placeholder="Search guides…" oninput="render()">
    </div>
    <nav class="nav" id="nav"></nav>
  </aside>

  <main class="main">
    <div class="main-head">
      <h2 id="head-title">All Guides</h2>
      <div class="desc" id="head-desc">Quick-reference guides for daily PawnMate operations</div>
    </div>
    <div id="board"></div>
  </main>
</div>

<!-- inconspicuous edit button -->
<div class="edit-fab" title="Edit guides" onclick="openEditor()">
  <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.58z"/></svg>
</div>

<!-- editor modal -->
<div class="backdrop" id="backdrop">
  <div class="modal">
    <div class="modal-head">
      <h3>Edit Guides</h3>
      <button class="modal-x" onclick="closeEditor()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="m-note">Changes appear instantly and are saved in <b>this browser</b>. To publish them to the live site for everyone, click <b>Download updated file</b> and replace <code>index.html</code> in your GitHub repo.</div>
      <div id="glist"></div>

      <div class="form">
        <h4 id="form-title">Add a guide</h4>
        <div class="field">
          <label>Section</label>
          <select id="f-section"></select>
        </div>
        <div class="row2">
          <div class="field icon">
            <label>Icon</label>
            <input id="f-icon" maxlength="3" placeholder="📄">
          </div>
          <div class="field">
            <label>Title</label>
            <input id="f-title" placeholder="How to…">
          </div>
        </div>
        <div class="field">
          <label>Description</label>
          <input id="f-desc" placeholder="Short one-line summary">
        </div>
        <div class="field">
          <label>Scribe URL</label>
          <input id="f-url" placeholder="https://scribehow.com/…">
        </div>
        <div class="btns">
          <button class="btn primary" id="form-submit" onclick="submitForm()">Add guide</button>
          <button class="btn ghost" id="form-cancel" onclick="resetForm()" style="display:none">Cancel edit</button>
        </div>
      </div>

      <div class="btns" style="margin-top:18px;border-top:1px solid var(--line);padding-top:16px">
        <button class="btn dark" onclick="exportHTML()">⬇ Download updated file</button>
        <button class="btn ghost" onclick="resetToDefaults()">Reset to original</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ─────────────────────────────────────────────────────────────
   EDIT HERE: to add a guide, copy one line and fill it in — or
   just use the edit button in the bottom-right corner of the page.
   section = the category it appears under (order set by SECTIONS)
   icon    = any emoji     url = the Scribe share link ("#" = placeholder)
   ───────────────────────────────────────────────────────────── */
const SECTIONS = ["Getting Started","Reports & History","Pawn Defaults & Layaways","Inventory & Listings"];

const DEFAULT_GUIDES = [
  { section:"Getting Started",          icon:"🔑", title:"Log Into PawnMate",                     desc:"Sign in and access your account",     url:"https://scribehow.com/o/RoG6ojVhQCy35-aQT3iaeg/viewer/How_to_Log_Into_PawnMate__Tv1_FnwmRGeMjmakYHLcPg" },
  { section:"Getting Started",          icon:"🏪", title:"Switch Between Stores",                 desc:"Move between store locations",         url:"https://scribehow.com/o/RoG6ojVhQCy35-aQT3iaeg/viewer/How_to_Switch_Between_Stores_on_PawnMate__AhCd3KcfTiqZ8upORCnXfg" },
  { section:"Reports & History",        icon:"📊", title:"Generate a Management Report",          desc:"Pull performance & summary reports",   url:"https://scribehow.com/o/RoG6ojVhQCy35-aQT3iaeg/viewer/How_To_Generate_A_Management_Report_In_PawnMate__v6cei59nQSio2lnG72zm6g" },
  { section:"Reports & History",        icon:"🧾", title:"Access Transaction History",            desc:"Look up past transactions",            url:"https://scribehow.com/o/RoG6ojVhQCy35-aQT3iaeg/viewer/How_to_Access_Transaction_History_in_Pawnmate__iFL7HupOSQqnw-IpFXbsKA" },
  { section:"Pawn Defaults & Layaways", icon:"📅", title:"View the 15-Day Pawn Defaultable List", desc:"See pawns approaching default",         url:"https://scribehow.com/o/RoG6ojVhQCy35-aQT3iaeg/viewer/How_to_View_the_15_Day_Pawn_Defaultable_List__V6qM_n4fTzyWR-t2IZUJwg" },
  { section:"Pawn Defaults & Layaways", icon:"💳", title:"Current & Defaultable Layaways",        desc:"Track active and at-risk layaways",     url:"https://scribehow.com/o/RoG6ojVhQCy35-aQT3iaeg/viewer/How_to_View_Current_and_Defaultable_Layaways_in_Pawnmate__oTSPHQZmTDqz1edj7lOU_Q" },
  { section:"Inventory & Listings",     icon:"📦", title:"Search for Aged Inventory",             desc:"Find items sitting in stock too long", url:"https://scribehow.com/o/RoG6ojVhQCy35-aQT3iaeg/viewer/How_to_Search_for_Aged_Inventory_on_PawnMate__rQ81QCU8SoeGCUiJP1cf0g" },
  { section:"Inventory & Listings",     icon:"🌐", title:"View Online Listings",                 desc:"See items listed online",              url:"https://scribehow.com/o/RoG6ojVhQCy35-aQT3iaeg/viewer/How_To_View_Online_Listings_On_PawnMate__c-n1b3wfRhCGtoB7r1zUkg" },
];
/* ───────────────────────────────────────────────────────────── */

const STORE_KEY = "pawnmate_guides_v1";
let GUIDES = JSON.parse(JSON.stringify(DEFAULT_GUIDES));
let active = "All";
let editingIndex = null;

/* load any saved edits from this browser */
try{ const s = localStorage.getItem(STORE_KEY); if(s){ const p = JSON.parse(s); if(Array.isArray(p)) GUIDES = p; } }catch(e){}
function save(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(GUIDES)); }catch(e){} }

function buildNav(){
  const nav = document.getElementById("nav");
  nav.innerHTML = `<div class="nav-label">Categories</div>`;
  const mk = (name, count) => {
    const el = document.createElement("div");
    el.className = "nav-item" + (active === name ? " active" : "");
    el.innerHTML = `<span>${name}</span><span class="count">${count}</span>`;
    el.onclick = () => { active = name; render(); };
    nav.appendChild(el);
  };
  mk("All", GUIDES.length);
  SECTIONS.forEach(s => mk(s, GUIDES.filter(g => g.section === s).length));
}

function render(){
  buildNav();
  const q = (document.getElementById("search").value || "").toLowerCase();
  document.getElementById("head-title").textContent = active === "All" ? "All Guides" : active;
  document.getElementById("head-desc").textContent = active === "All"
    ? "Quick-reference guides for daily PawnMate operations"
    : `${GUIDES.filter(g=>g.section===active).length} guide(s) in this category`;

  const board = document.getElementById("board");
  board.innerHTML = "";
  const shown = SECTIONS.filter(s => active === "All" || s === active);
  let total = 0;

  shown.forEach(sec => {
    const items = GUIDES.filter(g => g.section === sec &&
      (g.title.toLowerCase().includes(q) || g.desc.toLowerCase().includes(q)));
    if(!items.length) return;
    total += items.length;
    const section = document.createElement("div");
    section.className = "section";
    if(active === "All"){
      const h = document.createElement("div");
      h.className = "sec-title";
      h.textContent = sec;
      section.appendChild(h);
    }
    const grid = document.createElement("div");
    grid.className = "grid";
    items.forEach(g => {
      const a = document.createElement("a");
      a.className = "card";
      a.href = g.url;
      if(g.url && g.url !== "#"){ a.target = "_blank"; a.rel = "noopener"; }
      a.innerHTML = `<div class="ico">${g.icon}</div>
        <div><div class="c-title">${g.title}</div><div class="c-desc">${g.desc}</div></div>
        <span class="arrow">→</span>`;
      grid.appendChild(a);
    });
    section.appendChild(grid);
    board.appendChild(section);
  });

  if(!total){ board.innerHTML = `<div class="empty">No guides match “${q}”.</div>`; }
}

/* ── Editor ── */
function openEditor(){
  const sel = document.getElementById("f-section");
  sel.innerHTML = SECTIONS.map(s=>`<option>${s}</option>`).join("");
  resetForm();
  renderList();
  document.getElementById("backdrop").classList.add("open");
}
function closeEditor(){ document.getElementById("backdrop").classList.remove("open"); }

function renderList(){
  const box = document.getElementById("glist");
  box.innerHTML = "";
  GUIDES.forEach((g,i)=>{
    const row = document.createElement("div");
    row.className = "g-row";
    row.innerHTML = `<div class="g-ico">${g.icon||"📄"}</div>
      <div class="g-meta"><div class="g-t">${g.title||"(untitled)"}</div><div class="g-s">${g.section}</div></div>`;
    const edit = document.createElement("button");
    edit.textContent = "Edit";
    edit.onclick = ()=>startEdit(i);
    const del = document.createElement("button");
    del.className = "del"; del.textContent = "Delete";
    del.onclick = ()=>{
      if(del.classList.contains("confirm")){ GUIDES.splice(i,1); save(); render(); renderList(); resetForm(); }
      else { del.classList.add("confirm"); del.textContent = "Confirm?"; setTimeout(()=>{del.classList.remove("confirm");del.textContent="Delete";},2500); }
    };
    row.appendChild(edit); row.appendChild(del);
    box.appendChild(row);
  });
}

function startEdit(i){
  editingIndex = i;
  const g = GUIDES[i];
  document.getElementById("f-section").value = g.section;
  document.getElementById("f-icon").value = g.icon;
  document.getElementById("f-title").value = g.title;
  document.getElementById("f-desc").value = g.desc;
  document.getElementById("f-url").value = g.url;
  document.getElementById("form-title").textContent = "Edit guide";
  document.getElementById("form-submit").textContent = "Save changes";
  document.getElementById("form-cancel").style.display = "";
  document.querySelector(".modal-body").scrollTop = document.querySelector(".form").offsetTop;
}

function resetForm(){
  editingIndex = null;
  ["f-icon","f-title","f-desc","f-url"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("form-title").textContent = "Add a guide";
  document.getElementById("form-submit").textContent = "Add guide";
  document.getElementById("form-cancel").style.display = "none";
}

function submitForm(){
  const g = {
    section: document.getElementById("f-section").value,
    icon: document.getElementById("f-icon").value.trim() || "📄",
    title: document.getElementById("f-title").value.trim(),
    desc: document.getElementById("f-desc").value.trim(),
    url: document.getElementById("f-url").value.trim() || "#",
  };
  if(!g.title){ document.getElementById("f-title").focus(); return; }
  if(editingIndex===null) GUIDES.push(g);
  else GUIDES[editingIndex] = g;
  save(); render(); renderList(); resetForm();
}

function resetToDefaults(){
  GUIDES = JSON.parse(JSON.stringify(DEFAULT_GUIDES));
  save(); render(); renderList(); resetForm();
}

function exportHTML(){
  const serialized = "const DEFAULT_GUIDES = " + JSON.stringify(GUIDES, null, 2) + ";";
  let html = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
  html = html.replace(/const DEFAULT_GUIDES = \[[\s\S]*?\];/, () => serialized);
  const blob = new Blob([html], {type:"text/html"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "index.html"; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

render();
</script>
</body>
</html>
